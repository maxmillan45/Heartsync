<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartsync - {% block title %}Find Your Perfect Match{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hs-900: #2D0A1A;
            --hs-800: #5C1233;
            --hs-700: #8C1B4D;
            --hs-600: #B52360;
            --hs-500: #D93B78;
            --hs-400: #E8689A;
            --hs-300: #F0A0BF;
            --hs-200: #F7CCDC;
            --hs-100: #FBDFE9;
            --hs-50:  #FEF1F5;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--hs-100);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--hs-400);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--hs-600);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        hs: {
                            900: '#2D0A1A', 800: '#5C1233', 700: '#8C1B4D',
                            600: '#B52360', 500: '#D93B78', 400: '#E8689A',
                            300: '#F0A0BF', 200: '#F7CCDC', 100: '#FBDFE9', 50: '#FEF1F5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-hs-50 font-sans text-hs-900">

    <nav class="bg-white border-b border-hs-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <a href="{{ url_for('dashboard') }}" class="flex items-center space-x-2 hover:opacity-80 transition">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-hs-600 to-hs-400 flex items-center justify-center text-white font-bold text-sm">H</div>
                    <span class="text-xl font-bold text-hs-700">Heartsync</span>
                </a>
                
                <!-- Navigation Links -->
                <div class="hidden md:flex items-center space-x-1">
                    <a href="{{ url_for('dashboard') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Dashboard
                    </a>
                    <a href="{{ url_for('discover') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Discover
                    </a>
                    <a href="{{ url_for('matches') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Matches
                    </a>
                    <a href="{{ url_for('messages') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Messages
                    </a>
                    <a href="{{ url_for('notifications') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Notifications
                    </a>
                    <a href="{{ url_for('profile') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Profile
                    </a>
                    <a href="{{ url_for('settings') }}" class="px-3 py-1.5 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">
                        Settings
                    </a>
                    <a href="{{ url_for('logout') }}" class="ml-2 px-4 py-1.5 rounded-lg text-sm font-medium bg-hs-600 text-white hover:bg-hs-700 transition">
                        Logout
                    </a>
                </div>
                
                <!-- Mobile menu button -->
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg text-hs-600 hover:bg-hs-100 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Mobile Navigation -->
            <div id="mobileMenu" class="hidden md:hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="{{ url_for('dashboard') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Dashboard</a>
                    <a href="{{ url_for('discover') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Discover</a>
                    <a href="{{ url_for('matches') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Matches</a>
                    <a href="{{ url_for('messages') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Messages</a>
                    <a href="{{ url_for('notifications') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Notifications</a>
                    <a href="{{ url_for('profile') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Profile</a>
                    <a href="{{ url_for('settings') }}" class="px-3 py-2 rounded-lg text-sm font-medium text-hs-600 hover:bg-hs-50 hover:text-hs-800 transition">Settings</a>
                    <a href="{{ url_for('logout') }}" class="px-3 py-2 rounded-lg text-sm font-medium bg-hs-600 text-white hover:bg-hs-700 transition text-center">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
  
     <!-- Footer -->
    {% include 'footer.html' %}
    
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
