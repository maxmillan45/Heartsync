{% extends "base.html" %}

{% block title %}Settings - Heartsync{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl border border-hs-200 overflow-hidden">
    <div class="bg-gradient-to-r from-hs-600 to-hs-500 px-6 py-4">
        <h1 class="text-2xl font-bold text-white"><i class="fas fa-cog mr-2"></i> Settings</h1>
        <p class="text-hs-100 text-sm mt-1">Manage your account preferences</p>
    </div>
    
    <div class="p-6">
        <form id="profileForm" class="space-y-6">
            <h3 class="text-lg font-semibold text-hs-900"><i class="fas fa-user mr-2"></i> Profile Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Full Name</label>
                    <input type="text" id="fullName" value="{{ user.full_name }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Email</label>
                    <input type="email" value="{{ user_email }}" disabled class="w-full px-4 py-2 border border-hs-200 rounded-lg bg-hs-50 text-hs-500 outline-none cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Age</label>
                    <input type="number" id="age" value="{{ user.age }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Location</label>
                    <input type="text" id="location" value="{{ user.location }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Occupation</label>
                    <input type="text" id="occupation" value="{{ user.occupation }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Education</label>
                    <input type="text" id="education" value="{{ user.education }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Gender</label>
                    <select id="gender" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                        <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Non-binary" {% if user.gender == 'Non-binary' %}selected{% endif %}>Non-binary</option>
                    </select>
                </div>
                <div>
                    <label class="block text-hs-800 font-medium mb-2">Looking For</label>
                    <select id="lookingFor" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
                        <option value="Long-term relationship" {% if user.looking_for == 'Long-term relationship' %}selected{% endif %}>Long-term relationship</option>
                        <option value="Casual dating" {% if user.looking_for == 'Casual dating' %}selected{% endif %}>Casual dating</option>
                        <option value="Friendship" {% if user.looking_for == 'Friendship' %}selected{% endif %}>Friendship</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label class="block text-hs-800 font-medium mb-2">Bio</label>
                <textarea id="bio" rows="4" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none resize-none">{{ user.bio }}</textarea>
            </div>
            
            <div>
                <label class="block text-hs-800 font-medium mb-2">Interests</label>
                <input type="text" id="interests" value="{{ user.interests|join(', ') }}" class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 outline-none">
            </div>
            
            <div class="flex justify-end">
                <button type="submit" class="bg-hs-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-hs-700 transition">
                    <i class="fas fa-save mr-2"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = {
        full_name: document.getElementById('fullName').value,
        age: parseInt(document.getElementById('age').value),
        location: document.getElementById('location').value,
        occupation: document.getElementById('occupation').value,
        bio: document.getElementById('bio').value,
        interests: document.getElementById('interests').value.split(',').map(i => i.trim()),
        gender: document.getElementById('gender').value,
        looking_for: document.getElementById('lookingFor').value,
        height: document.getElementById('height')?.value || '',
        education: document.getElementById('education').value
    };
    
    const response = await fetch('/api/update-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
    });
    const data = await response.json();
    if (data.success) {
        alert('Profile updated successfully!');
        location.reload();
    } else {
        alert('Error: ' + (data.error || 'Unknown error'));
    }
});
</script>
{% endblock %}
