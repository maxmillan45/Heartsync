{% extends "base.html" %}

{% block title %}Login - Heartsync{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-hs-200">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-hs-600 to-hs-400 flex items-center justify-center text-white text-2xl mx-auto mb-4">
                <i class="fas fa-heart"></i>
            </div>
            <h1 class="text-2xl font-bold text-hs-900">Welcome to Heartsync</h1>
            <p class="text-hs-600 mt-2">Find your perfect match</p>
        </div>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
            <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-hs-800 font-medium mb-2">
                    <i class="fas fa-envelope mr-2 text-hs-500"></i> Email Address
                </label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 focus:border-hs-500 outline-none">
            </div>
            
            <div>
                <label class="block text-hs-800 font-medium mb-2">
                    <i class="fas fa-lock mr-2 text-hs-500"></i> Password
                </label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2 border border-hs-200 rounded-lg focus:ring-2 focus:ring-hs-500 focus:border-hs-500 outline-none">
            </div>
            
            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" name="remember" class="rounded border-hs-300 text-hs-600 focus:ring-hs-500">
                    <span class="ml-2 text-sm text-hs-600">
                        <i class="fas fa-check-circle mr-1"></i> Remember me
                    </span>
                </label>
                <a href="#" class="text-sm text-hs-600 hover:text-hs-700">
                    <i class="fas fa-question-circle mr-1"></i> Forgot password?
                </a>
            </div>
            
            <button type="submit" class="w-full bg-hs-600 text-white py-2 rounded-lg font-semibold hover:bg-hs-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>
        
        <p class="text-center text-hs-600 mt-6">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-hs-700 font-semibold hover:text-hs-800">
                <i class="fas fa-user-plus mr-1"></i> Register
            </a>
        </p>
    </div>
</div>
{% endblock %}
