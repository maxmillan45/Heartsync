{% extends "base.html" %}

{% block title %}Select Category - Heartsync{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8 border border-hs-200">
    <div class="text-center mb-8">
        <i class="fas fa-tag text-4xl text-hs-600 mb-3"></i>
        <h1 class="text-2xl font-bold text-hs-900">Select Your Category</h1>
        <p class="text-hs-600 mt-2">Choose the category that best describes you</p>
    </div>
    
    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        {% for key, category in categories.items() %}
        <label class="cursor-pointer">
            <input type="radio" name="category" value="{{ key }}" class="hidden peer" required>
            <div class="border-2 border-hs-200 rounded-xl p-4 text-center hover:border-hs-600 transition peer-checked:border-hs-600 peer-checked:bg-hs-50">
                <div class="w-16 h-16 bg-hs-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    {% if key == 'student' %}
                    <i class="fas fa-graduation-cap text-2xl text-hs-600"></i>
                    {% elif key == 'gamer' %}
                    <i class="fas fa-gamepad text-2xl text-hs-600"></i>
                    {% elif key == 'professional' %}
                    <i class="fas fa-briefcase text-2xl text-hs-600"></i>
                    {% elif key == 'fitness' %}
                    <i class="fas fa-dumbbell text-2xl text-hs-600"></i>
                    {% elif key == 'creative' %}
                    <i class="fas fa-palette text-2xl text-hs-600"></i>
                    {% elif key == 'traveler' %}
                    <i class="fas fa-plane text-2xl text-hs-600"></i>
                    {% elif key == 'foodie' %}
                    <i class="fas fa-utensils text-2xl text-hs-600"></i>
                    {% else %}
                    <i class="fas fa-user text-2xl text-hs-600"></i>
                    {% endif %}
                </div>
                <h3 class="font-semibold text-hs-900">{{ category.name }}</h3>
                <p class="text-xs text-hs-500 mt-1">{{ category.description }}</p>
            </div>
        </label>
        {% endfor %}
        
        <div class="md:col-span-2 lg:col-span-4 mt-6">
            <button type="submit" class="w-full bg-hs-600 text-white py-3 rounded-lg font-semibold hover:bg-hs-700 transition">
                <i class="fas fa-arrow-right mr-2"></i> Continue
            </button>
        </div>
    </form>
</div>
{% endblock %}
