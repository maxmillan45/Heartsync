{% extends "base.html" %}
{% block title %}Select Category - Heartsync{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8 border border-hs-200">
    <h1 class="text-2xl font-bold text-hs-900 text-center mb-6">Select Your Category</h1>
    <form method="POST" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        {% for key, cat in categories.items() %}
        <label class="cursor-pointer">
            <input type="radio" name="category" value="{{ key }}" class="hidden peer" required>
            <div class="border-2 border-hs-200 rounded-xl p-4 text-center hover:border-hs-600 peer-checked:border-hs-600 peer-checked:bg-hs-50">
                <i class="fas {{ cat.icon }} text-3xl text-hs-600 mb-2"></i>
                <p class="font-semibold">{{ cat.name }}</p>
            </div>
        </label>
        {% endfor %}
        <div class="col-span-full mt-6">
            <button type="submit" class="w-full bg-hs-600 text-white py-2 rounded-lg font-semibold hover:bg-hs-700">Continue</button>
        </div>
    </form>
</div>
{% endblock %}
